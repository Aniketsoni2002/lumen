services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      LUMEN_OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama

volumes:
  ollama:
